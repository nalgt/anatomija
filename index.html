<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIO-SANDBOX: Weapon Arsenal & Multi-Layer Engine</title>
    <link rel="icon" href="data:,">
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #ffffff; /* Čisto bela pozadina */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #0f172a; user-select: none;
        }
        #view-container { width: 100%; height: 100%; position: absolute; z-index: 1; }
        .hud {
            position: absolute; z-index: 10;
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(15, 23, 42, 0.15);
            border-radius: 12px; padding: 18px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            max-height: 85vh; overflow-y: auto;
        }
        #ui-left { top: 20px; left: 20px; width: 280px; }
        #ui-right { top: 20px; right: 20px; width: 300px; }
        #ui-bottom { bottom: 20px; left: 50%; transform: translateX(-50%); width: 40%; display: flex; justify-content: space-around; text-align: center; }
        
        h2 { font-size: 12px; text-transform: uppercase; letter-spacing: 1.5px; margin: 0 0 12px 0; color: #dc2626; border-bottom: 1px solid rgba(0,0,0,0.08); padding-bottom: 6px; font-weight: 800; }
        .title { font-size: 10px; color: #475569; text-transform: uppercase; margin: 12px 0 6px 0; font-weight: bold; letter-spacing: 0.5px; }
        
        .btn {
            width: 100%; background: #2563eb; color: white; border: none;
            padding: 10px; margin-bottom: 6px; border-radius: 6px; font-weight: bold;
            cursor: pointer; font-family: monospace; text-align: left; transition: all 0.15s; font-size: 11px;
        }
        .btn:hover { background: #1d4ed8; transform: translateY(-1px); }
        .btn-weapon { background: #475569; }
        .btn-weapon:hover { background: #334155; }
        .btn-weapon.active { background: #dc2626; box-shadow: 0 0 10px rgba(220,38,38,0.4); }
        .btn-danger { background: #dc2626; }
        .btn-danger:hover { background: #b91c1c; }
        
        .layer-checkbox { display: flex; align-items: center; margin-bottom: 6px; font-size: 12px; font-weight: 600; color: #334155; cursor: pointer; }
        .layer-checkbox input { margin-right: 8px; width: 15px; height: 15px; cursor: pointer; }
        
        .spec-box { background: rgba(0,0,0,0.04); border: 1px solid rgba(0,0,0,0.08); padding: 10px; border-radius: 6px; font-size: 11px; color: #1e293b; line-height: 1.4; }
        #console-log { height: 90px; overflow-y: auto; background: rgba(0,0,0,0.04); border-radius: 6px; padding: 8px; font-family: monospace; font-size: 10px; color: #475569; }
        .stat-val { font-size: 22px; font-weight: bold; color: #16a34a; margin-top: 4px; }
        .dead { color: #dc2626 !important; animation: red-pulse 0.4s infinite alternate; }
        .hint { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); z-index: 5; font-size: 11px; color: #475569; background: rgba(255,255,255,0.85); padding: 6px 15px; border-radius: 20px; pointer-events: none; border: 1px solid rgba(0,0,0,0.1); font-weight: 600; }
        @keyframes red-pulse { from { opacity: 1; } to { opacity: 0.5; } }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 4px; }
    </style>
</head>
<body>

    <div class="hint">IZABERI ORUŽJE DESNO // KLIKNI ILI PREVRECI PREKO TELA ZA MASAKR // TOČKIĆ ROTIRA OSVRT</div>
    <canvas id="view-container"></canvas>

    <!-- LEVI PANEL: Slojevi i selekcija -->
    <div class="hud" id="ui-left">
        <h2>Slojevi Tela (Layers)</h2>
        <label class="layer-checkbox"><input type="checkbox" id="layer-skin" checked> Visceralna Koža</label>
        <label class="layer-checkbox"><input type="checkbox" id="layer-skeleton" checked> Koštani Skelet</label>
        <label class="layer-checkbox"><input type="checkbox" id="layer-vessels" checked> Vaskularni Krvotok</label>
        <label class="layer-checkbox"><input type="checkbox" id="layer-organs" checked> Unutrašnji Organi</label>

        <div class="title" style="margin-top:15px;">Hirurški Alati:</div>
        <button class="btn" id="add-heart">❤️ Kloniraj Novo Srce</button>
        <button class="btn" id="add-lungs">🫁 Kloniraj Pluća</button>
        <button class="btn" id="add-liver">🪵 Kloniraj Jetru</button>
        
        <div class="title" style="margin-top:15px;">Fokusirano Tkivo:</div>
        <div id="selection-box">
            <div class="spec-box" style="color:#64748b;">Klikni na organ za selekciju (kada je aktivan alat "Šaka").</div>
        </div>
        <button class="btn btn-danger" id="vaporize-btn" style="margin-top:10px;">Vaporizuj organ</button>
    </div>

    <!-- DESNI PANEL: Oružje i patologija -->
    <div class="hud" id="ui-right">
        <h2>Arsenal Oružja</h2>
        <button class="btn btn-weapon active" id="weap-hand">✋ Alat: Šaka (Hvatanje/Bacanje)</button>
        <button class="btn btn-weapon" id="weap-knife">🔪 Nož (Rezanje/Kidanje)</button>
        <button class="btn btn-weapon" id="weap-pistol">🔫 Pištolj (9mm Prostrel)</button>
        <button class="btn btn-weapon" id="weap-ak47">💥 AK-47 (Automatski Rafal)</button>
        <button class="btn btn-weapon" id="weap-crossbow">🏹 Samostrel (Zabodene Strele)</button>
        <button class="btn btn-weapon" id="weap-rpg">🚀 RPG-7 (Destrukcija/Eksplozija)</button>

        <div class="title" style="margin-top:15px;">Sistemska Konzola:</div>
        <div id="console-log"></div>
        <button class="btn" id="reset-btn" style="background:#475569; color: white; margin-top:10px;">🔄 Kompletna Regeneracija</button>
    </div>

    <!-- DONJI PANEL: Vitalni znaci -->
    <div class="hud" id="ui-bottom">
        <div style="width:33%;">
            <div style="font-size:10px; color:#475569; font-weight:bold;">SUBJEKAT</div>
            <div class="stat-val" id="hud-state">OPERATIVAN</div>
        </div>
        <div style="width:33%;">
            <div style="font-size:10px; color:#475569; font-weight:bold;">PULS (BPM)</div>
            <div class="stat-val" id="hud-bpm">72</div>
        </div>
        <div style="width:33%;">
            <div style="font-size:10px; color:#475569; font-weight:bold;">ZASIĆENOST O2</div>
            <div class="stat-val" id="hud-o2">98%</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('view-container');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        let sim = { bpm: 72, o2: 98, hp: 100, isAlive: true, state: "OPERATIVAN" };
        
        // Podešavanja vidljivosti slojeva čoveka
        let layers = { skin: true, skeleton: true, vessels: true, organs: true };

        // Izabrano oružje
        let activeWeapon = 'hand'; // hand, knife, pistol, ak47, crossbow, rpg

        // Fizika za celo Ragdoll telo
        let bodyPhys = { x: width / 2, y: height / 2 - 80, vx: 0, vy: 0, radius: 180 };

        let rotX = 0.4, rotY = 0.6;
        let isDragging = false, dragTarget = null;
        let mouseX = 0, mouseY = 0, lastMouseX = 0, lastMouseY = 0;

        let organs = [], targeted = null;
        let bloodParticles = [];
        let projectiles = []; // Projektili (Rakete, strele)
        let stuckArrows = []; // Strele koje su ostale zabodene u telu

        // Matematički modeli skeleta i krvotoka (3D tačke)
        let skeletonPoints = [];
        let vesselPoints = [];
        let skinPoints = [];

        const GRAVITY = 0.4;
        const BOUNCE = -0.55;
        const FRICTION = 0.97;

        // Generisanje 3D tačaka za sisteme slojeva tela
        function buildHumanLayers() {
            skeletonPoints = []; vesselPoints = []; skinPoints = [];
            
            // Rešetka kostiju (Gusta struktura)
            for(let y = -1.5; y <= 1.5; y += 0.1) {
                skeletonPoints.push({x: 0, y: y, z: 0, type: 'spine'}); // Kičma
                if(y > -0.2 && y < 0.8) {
                    for(let r = 0.1; r <= 0.5; r += 0.15) {
                        skeletonPoints.push({x: Math.sin(r*4)*0.4, y: y, z: Math.cos(r*4)*0.3, type: 'rib'}); // Rebra
                        skeletonPoints.push({x: -Math.sin(r*4)*0.4, y: y, z: Math.cos(r*4)*0.3, type: 'rib'});
                    }
                }
            }
            // Lobanja
            for(let i=0; i<60; i++) {
                let th = Math.random()*Math.PI*2, ph = Math.random()*Math.PI;
                skeletonPoints.push({x: 0.3*Math.sin(ph)*Math.cos(th), y: 1.6 + 0.3*Math.cos(ph), z: 0.2*Math.sin(ph)*Math.sin(th), type: 'skull'});
            }

            // Kapilari i krvni sudovi (Vessels)
            for(let i=0; i<250; i++) {
                vesselPoints.push({
                    x: (Math.random() - 0.5) * 0.9,
                    y: (Math.random() - 0.5) * 2.8,
                    z: (Math.random() - 0.5) * 0.4
                });
            }

            // Spoljna koža (Prozirna mreža tačaka omotača)
            for(let i=0; i<300; i++) {
                let th = Math.random()*Math.PI*2;
                let y = (Math.random() - 0.5) * 3.0;
                let rad = 0.5 * (1.5 - Math.abs(y)*0.2); // Anatomsko sužavanje ka nogama i vratu
                if(y > 1.3) rad = 0.35; // Glava
                skinPoints.push({ x: rad * Math.cos(th), y: y, z: rad * Math.sin(th) });
            }
        }

        function generateMeshPoints(type) {
            let pts = [];
Use code with caution.let count = type === 'Srce' ? 220 : type === 'Pluća' ? 300 : 250;for(let i=0; i<count; i++) {let theta = Math.random() * Math.PI * 2, phi = Math.random() * Math.PI;let rx = 0.3, ry = 0.3, rz = 0.3;if (type === 'Srce') { ry = 0.4; rx = 0.3 * (1 + Math.cos(phi)*0.2); }else if (type === 'Pluća') { ry = 0.55; rx = 0.24; }else { rx = 0.45; ry = 0.26; rz = 0.35; }pts.push({ ox: rx * Math.sin(phi) * Math.cos(theta), oy: ry * Math.cos(phi), oz: rz * Math.sin(phi) * Math.sin(theta), nx: Math.sin(phi) * Math.cos(theta), ny: Math.cos(phi), nz: Math.sin(phi) * Math.sin(theta) });}return pts;}function project3D(x, y, z, centerX, centerY) {let cosY = Math.cos(rotY), sinY = Math.sin(rotY);let x1 = x * cosY - z * sinY; let z1 = x * sinY + z * cosY;let cosX = Math.cos(rotX), sinX = Math.sin(rotX);let y2 = y * cosX - z1 * sinX; let z2 = y * sinX + z1 * cosX;let scale = 190; let distance = 3.5; let fov = scale / (distance + z2);return { x: centerX + x1 * fov, y: centerY - y2 * fov, depth: z2 };}function spawnOrgan(type, lx, ly) {if(!sim.isAlive) return;let organ = { id: Math.random().toString(), type: type, ox: lx !== undefined ? lx : (Math.random() - 0.5) * 0.6, oy: ly !== undefined ? ly : (Math.random() - 0.5) * 1.0, oz: (Math.random() - 0.5) * 0.15, color: type === 'Srce' ? '#dc2626' : type === 'Pluća' ? '#db2777' : '#991b1b', health: 100.0, scale: 1.0, isSick: false, points: generateMeshPoints(type) };organs.push(organ);logToConsole(SINTETIZOVAN ORGAN: [${type.toUpperCase()}]);}function spawnBloodExplosion(x, y, count = 40, speedScale = 1, color = '#dc2626') {for(let i=0; i<count; i++) {let angle = Math.random() * Math.PI * 2;let speed = (Math.random() * 6 + 2) * speedScale;bloodParticles.push({ x: x, y: y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - (Math.random() * 2), radius: Math.random() * 4 + 1.2, alpha: 1.0, color: color });}}// --- ORUŽANE AKTIVACIJE I PALJBA ---function fireWeapon(mx, my) {if(!sim.isAlive) return;if (activeWeapon === 'knife') {// Nož seče u malom radijusu oko mišaspawnBloodExplosion(mx, my, 8, 0.4);organs.forEach(o => {let proj = project3D(o.ox, o.oy, o.oz, bodyPhys.x, bodyPhys.y);if(Math.hypot(mx - proj.x, my - proj.y) < 45) {o.health = Math.max(0, o.health - 25);o.color = '#7f1d1d';logToConsole(🔪 REZ: Oštećeno tkivo [${o.type.toUpperCase()}]);}});}else if (activeWeapon === 'pistol' || activeWeapon === 'ak47') {// Paljba iz vatrenog oružjalet dmg = activeWeapon === 'pistol' ? 35 : 15;let count = activeWeapon === 'pistol' ? 15 : 8;spawnBloodExplosion(mx, my, count, 1.4, '#b91c1c');// Kinetički udarac metka pomera celo telobodyPhys.vx += (Math.random() - 0.5) * 5;bodyPhys.vy -= Math.random() * 4;organs.forEach(o => {let proj = project3D(o.ox, o.oy, o.oz, bodyPhys.x, bodyPhys.y);if(Math.hypot(mx - proj.x, my - proj.y) < 35) {o.health = Math.max(0, o.health - dmg);logToConsole(💥 PROSTREL: Metak probušio [${o.type.toUpperCase()}]!);}});}else if (activeWeapon === 'crossbow') {// Ispali strelu sa vrha ekrana ka mišuprojectiles.push({type: 'arrow',x: mx + (Math.random() - 0.5) * 200, y: 0,targetX: mx, targetY: my,vx: 0, vy: 15,active: true});}else if (activeWeapon === 'rpg') {// Ispali RPG raketu sa straneprojectiles.push({type: 'rocket',x: 0, y: my,targetX: mx, targetY: my,vx: 18, vy: (my - my) / 20,active: true});logToConsole(🚀 LANSIRANJE: Raketa RPG-7 je ispaljena!);}}// --- INTERAKCIJA MIŠA ---window.onmousedown = (e) => {if (e.clientX < 300 || e.clientX > width - 320) return;mouseX = e.clientX; mouseY = e.clientY;isDragging = true;if (activeWeapon === 'hand') {// Standardno hvatanje/bacanjelet clickedOrgan = null; let minDist = 35;organs.forEach(o => {let proj = project3D(o.ox, o.oy, o.oz, bodyPhys.x, bodyPhys.y);let d = Math.hypot(mouseX - proj.x, mouseY - proj.y);if (d < minDist) { clickedOrgan = o; minDist = d; }});if (clickedOrgan) { dragTarget = clickedOrgan; targeted = clickedOrgan; renderSelectionUi(); }else if (Math.hypot(mouseX - bodyPhys.x, mouseY - bodyPhys.y) < bodyPhys.radius) { dragTarget = 'body'; }else { dragTarget = 'trackball'; }} else {// Ako je izabrano oružje, odmah pucaj/secifireWeapon(mouseX, mouseY);dragTarget = activeWeapon === 'ak47' ? 'firing_auto' : null; // Omogućava rafal}lastMouseX = mouseX; lastMouseY = mouseY;};window.onmousemove = (e) => {let currentX = e.clientX; let currentY = e.clientY;let dx = currentX - lastMouseX; let dy = currentY - lastMouseY;if (isDragging) {if (dragTarget === 'body') { bodyPhys.x = currentX; bodyPhys.y = currentY; bodyPhys.vx = dx * 0.7; bodyPhys.vy = dy * 0.7; }else if (dragTarget === 'trackball') { rotY += dx * 0.007; rotX += dy * 0.007; }else if (dragTarget === 'firing_auto') { fireWeapon(currentX, currentY); // Automatski rafal AK-47 pri vučenju miša} else if (dragTarget && dragTarget !== 'knife' && dragTarget !== 'pistol' && dragTarget !== 'crossbow' && dragTarget !== 'rpg') {dragTarget.ox += dx / 185; dragTarget.oy -= dy / 185;}}lastMouseX = currentX; lastMouseY = currentY;};window.onmouseup = () => { isDragging = false; dragTarget = null; };window.onwheel = (e) => { rotY += e.deltaY * 0.001; };// --- ARSENAL / HUD EVENT VEZIVANJE ---function setWeapon(mode, btnId) {activeWeapon = mode;document.querySelectorAll('.btn-weapon').forEach(b => b.classList.remove('active'));document.getElementById(btnId).classList.add('active');logToConsole(ORUŽJE: Aktiviran [${mode.toUpperCase()}]);}document.getElementById('weap-hand').onclick = () => setWeapon('hand', 'weap-hand');document.getElementById('weap-knife').onclick = () => setWeapon('knife', 'weap-knife');document.getElementById('weap-pistol').onclick = () => setWeapon('pistol', 'weap-pistol');document.getElementById('weap-ak47').onclick = () => setWeapon('ak47', 'weap-ak47');document.getElementById('weap-crossbow').onclick = () => setWeapon('crossbow', 'weap-crossbow');document.getElementById('weap-rpg').onclick = () => setWeapon('rpg', 'weap-rpg');// Čitanje checkbox slojeva u realnom vremenufunction updateLayers() {layers.skin = document.getElementById('layer-skin').checked;layers.skeleton = document.getElementById('layer-skeleton').checked;layers.vessels = document.getElementById('layer-vessels').checked;layers.organs = document.getElementById('layer-organs').checked;}document.querySelectorAll('.layer-checkbox input').forEach(i => i.onchange = updateLayers);document.getElementById('add-heart').onclick = () => spawnOrgan('Srce');document.getElementById('add-lungs').onclick = () => spawnOrgan('Pluća');document.getElementById('add-liver').onclick = () => spawnOrgan('Jetra');document.getElementById('vaporize-btn').onclick = () => {if(!targeted) return;let proj = project3D(targeted.ox, targeted.oy, targeted.oz, bodyPhys.x, bodyPhys.y);spawnBloodExplosion(proj.x, proj.y, 40, 1);organs = organs.filter(o => o.id !== targeted.id); targeted = null;};document.getElementById('reset-btn').onclick = hardReset;function renderSelectionUi() {const box = document.getElementById('selection-box');if(!targeted) return;box.innerHTML = <div class="spec-box"><strong>ORGAN:</strong> ${targeted.type.toUpperCase()}<br><strong>INTEGRITET:</strong> ${targeted.health.toFixed(1)}%</div>;}function runBiologyEngine() {if(!sim.isAlive) return;let hearts = organs.filter(o => o.type === 'Srce' && o.health > 15).length;let lungs = organs.filter(o => o.type === 'Pluća' && o.health > 15).length;if (hearts === 0) { sim.bpm = Math.max(0, sim.bpm - 12); sim.hp -= 10; }if (lungs === 0) { sim.o2 = Math.max(0, sim.o2 - 10); sim.hp -= 8; }// Ako organi krvare, kaplji krv nadole iz njihorgans.forEach(o => {if(o.health < 60 && Math.random() > 0.5) {let proj = project3D(o.ox, o.oy, o.oz, bodyPhys.x, bodyPhys.y);spawnBloodExplosion(proj.x, proj.y, 1, 0.3, '#991b1b');}});if (sim.hp <= 0 || sim.bpm === 0 || sim.o2 === 0) {sim.isAlive = false; sim.bpm = 0; sim.o2 = 0; sim.state = "DESTRUKCIJA / SMRT";document.getElementById('hud-state').className = "stat-val dead";logToConsole("💀 TELEMETRIJA: Životne funkcije ugašene usled masivnih trauma.");}document.getElementById('hud-bpm').innerText = sim.bpm;document.getElementById('hud-o2').innerText = sim.o2 + "%";document.getElementById('hud-state').innerText = sim.state;}function hardReset() {organs = []; targeted = null; bloodParticles = []; projectiles = []; stuckArrows = [];sim = { bpm: 72, o2: 98, hp: 100, isAlive: true, state: "OPERATIVAN" };bodyPhys = { x: width / 2, y: height / 2 - 80, vx: 0, vy: 0, radius: 180 };document.getElementById('hud-state').className = "stat-val";buildHumanLayers();spawnOrgan('Srce', 0, 0.35);spawnOrgan('Pluća', -0.4, 0.45);spawnOrgan('Pluća', 0.4, 0.45);spawnOrgan('Jetra', -0.2, -0.3);logToConsole("🤖 REGEN: Ćelije, skelet i svi slojevi subjekta su kompletno obnovljeni.");}function logToConsole(msg) {const box = document.getElementById('console-log');if(box) { box.innerHTML += <div>> ${msg}</div>; box.scrollTop = box.scrollHeight; }}// --- GLAVNA SIMULACIONA PETLJA FIZIKE I CRTAČA ---function mainLoop() {ctx.fillStyle = '#ffffff';ctx.fillRect(0, 0, width, height);// 1. PRIMENI GRAVITACIJU NA RAGDOLL TELOif (dragTarget !== 'body') {bodyPhys.vy += GRAVITY;bodyPhys.x += bodyPhys.vx; bodyPhys.y += bodyPhys.vy;bodyPhys.vx *= FRICTION; bodyPhys.vy *= FRICTION;// Odskakanje i granice ekranaif (bodyPhys.y + bodyPhys.radius > height) {bodyPhys.y = height - bodyPhys.radius; bodyPhys.vy *= BOUNCE;if(Math.abs(bodyPhys.vy) > 3) spawnBloodExplosion(bodyPhys.x, height - 10, Math.floor(Math.abs(bodyPhys.vy)*4));}if (bodyPhys.x + bodyPhys.radius > width - 310) { bodyPhys.x = width - 310 - bodyPhys.radius; bodyPhys.vx *= BOUNCE; }if (bodyPhys.x - bodyPhys.radius < 290) { bodyPhys.x = 290 + bodyPhys.radius; bodyPhys.vx *= BOUNCE; }}// 2. PROJEKTILI (Fizika strela i RPG raketa)for(let i = projectiles.length - 1; i >= 0; i--) {let pr = projectiles[i];pr.x += pr.vx; pr.y += pr.vy;// Crtanje projektila u letuctx.fillStyle = pr.type === 'rocket' ? '#475569' : '#0f172a';ctx.beginPath(); ctx.arc(pr.x, pr.y, pr.type === 'rocket' ? 6 : 2, 0, Math.PI*2); ctx.fill();
