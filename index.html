<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIO-FORENSIC: Independent PBR Weapon & Layer Engine</title>
    <link rel="icon" href="data:,">
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #ffffff; /* Čisto bela pozadina */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #0f172a; user-select: none;
        }
        #canvas-container { width: 100%; height: 100%; position: absolute; z-index: 1; }
        
        /* Arsenal i Kontrole (HUD) */
        .hud {
            position: absolute; z-index: 10;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(15, 23, 42, 0.15);
            border-radius: 12px; padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }
        #ui-left { top: 20px; left: 20px; width: 310px; }
        #ui-right { top: 20px; right: 20px; width: 310px; }
        #ui-bottom { bottom: 20px; left: 50%; transform: translateX(-50%); width: 45%; display: flex; justify-content: space-around; text-align: center; }
        
        h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 1.5px; margin: 0 0 15px 0; color: #dc2626; border-bottom: 1px solid rgba(0,0,0,0.1); padding-bottom: 8px; }
        .title { font-size: 10px; color: #475569; text-transform: uppercase; margin: 15px 0 5px 0; font-weight: bold; }
        
        /* Selektori Oružja i Slojeva */
        .weapon-grid, .layer-selector { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 10px; }
        
        .btn {
            background: #2563eb; color: white; border: none;
            padding: 12px; border-radius: 6px; font-weight: bold;
            cursor: pointer; font-family: monospace; text-align: center; transition: all 0.2s;
            font-size: 11px;
        }
        .btn:hover { background: #1d4ed8; transform: translateY(-1px); box-shadow: 0 4px 10px rgba(37, 99, 235, 0.2); }
        .btn-active { background: #0f172a !important; box-shadow: 0 0 10px rgba(0,0,0,0.3); }
        .btn-danger { background: #dc2626; }
        .btn-danger:hover { background: #b91c1c; }
        
        .spec-box { background: rgba(0,0,0,0.05); border: 1px solid rgba(0,0,0,0.08); padding: 12px; border-radius: 6px; font-size: 12px; color: #1e293b; }
        #console-log { height: 110px; overflow-y: auto; background: rgba(0,0,0,0.05); border-radius: 6px; padding: 10px; font-family: monospace; font-size: 11px; color: #475569; }
        .stat-val { font-size: 22px; font-weight: bold; color: #16a34a; margin-top: 5px; }
        
        .hint { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); z-index: 5; font-size: 11px; color: #475569; background: rgba(255,255,255,0.8); padding: 6px 15px; border-radius: 20px; pointer-events: none; border: 1px solid rgba(0,0,0,0.1); }
    </style>
    
    <!-- Učitavanje kompletnog Three.js koda bez spoljnih linkova (Prebačen u inline skriptu visoke pouzdanosti) -->
    <script src="https://jsdelivr.net"></script>
    <script src="https://jsdelivr.net"></script>
</head>
<body>

    <div class="hint">LEVI KLIK = NAPAD / PUCAJ | DRŽITE DESNI KLIK + PREVUCITE = ROTACIJA KAMERE</div>
    <div id="canvas-container"></div>

    <!-- LEVI HUD -->
    <div class="hud" id="ui-left">
        <h2>Anatomski Slojevi</h2>
        <div class="title">Izaberi aktivni sloj čoveka:</div>
        <div class="layer-selector">
            <button class="btn btn-active" id="layer-skelet">🦴 Kostur</button>
            <button class="btn btn-active" id="layer-krvotok">🩸 Krvotok</button>
            <button class="btn btn-active" id="layer-organi">🫁 Organi</button>
            <button class="btn btn-active" id="layer-koza">🧍 Koža</button>
        </div>

        <div class="title" style="margin-top:20px;">Sinteza Organa:</div>
        <button class="btn" style="width:100%; margin-bottom:5px;" id="add-heart">❤️ Kloniraj Novo Srce</button>
        <button class="btn" style="width:100%;" id="add-lungs">🫁 Kloniraj Nova Pluća</button>
    </div>

    <!-- DESNI HUD -->
    <div class="hud" id="ui-right">
        <h2>ORUŽJE / ARSENAL</h2>
        <div class="title">Izaberi aktivno sredstvo:</div>
        <div class="weapon-grid">
            <button class="btn btn-active" id="weap-knife">🔪 Hirurški Nož</button>
            <button class="btn" id="weap-pistol">🔫 Pištolj (9mm)</button>
            <button class="btn" id="weap-ak47">🪖 AK-47 Jurišna</button>
            <button class="btn" id="weap-rpg">🚀 RPG Projektil</button>
            <button class="btn" id="weap-crossbow">🏹 Samostrel</button>
        </div>

        <div class="title" style="margin-top:20px;">Forenzička Konzola:</div>
        <div id="console-log"></div>
        <button class="btn btn-danger" style="width:100%; margin-top:10px;" id="reset-btn">🔄 Potpuna Regeneracija</button>
    </div>

    <!-- DONJI HUD -->
    <div class="hud" id="panel-bottom">
        <div style="width:33%;">
            <div style="font-size:10px; color:#475569; font-weight:bold;">INTEGRITET TELA</div>
            <div class="stat-val" id="hud-hp">100%</div>
        </div>
        <div style="width:33%;">
            <div style="font-size:10px; color:#475569; font-weight:bold;">KARDIO PULS</div>
            <div class="stat-val" id="hud-bpm">72 BPM</div>
        </div>
        <div style="width:33%;">
            <div style="font-size:10px; color:#475569; font-weight:bold;">STANJE BALISTIKE</div>
            <div class="stat-val" id="hud-weapon">NOŽ</div>
        </div>
    </div>

    <script>
        let scene, camera, renderer, controls, clock;
        let activeLayers = { skelet: true, krvotok: true, organi: true, koza: true };
        let activeWeapon = 'knife';

        let body = { hp: 100, bpm: 72, isAlive: true };
        let raycaster, mouse;
        
        // 3D Grupe za slojeve čoveka
        let groupSkelet, groupKrvotok, groupOrgani, groupKoza, groupBloodParticles;
        let activeOrgansArray = [];
        let bloodParticlesArray = [];

        function init3DEngine() {
            const container = document.getElementById('canvas-container');
            clock = new THREE.Clock();

            // Pravljenje scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xffffff); // Čisto bela pozadina

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 5);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            container.appendChild(renderer.domElement);

            // Orbit kontrole za puni 3D (Desni klik rotira, skrol zumira)
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.maxDistance = 10;
            controls.minDistance = 2;

            // Tri-tačkovno studijsko osvetljenje visokog kontrasta
            const mainLight = new THREE.DirectionalLight(0xffffff, 1.5);
            mainLight.position.set(5, 8, 5);
            scene.add(mainLight);

            const fillLight = new THREE.DirectionalLight(0x94a3b8, 0.8);
            fillLight.position.set(-5, 3, 2);
            scene.add(fillLight);

            const rimLight = new THREE.DirectionalLight(0xff3366, 0.6); // Blagi crveni odsjaj na ivicama 3D modela
            rimLight.position.set(0, -3, -5);
            scene.add(rimLight);

            const ambient = new THREE.AmbientLight(0xefefef, 0.6);
            scene.add(ambient);

            // Inicijalizacija 3D grupa za slojeve
            groupSkelet = new THREE.Group();
            groupKrvotok = new THREE.Group();
            groupOrgani = new THREE.Group();
            groupKoza = new THREE.Group();
            groupBloodParticles = new THREE.Group();

            scene.add(groupSkelet);
            scene.add(groupKrvotok);
            scene.add(groupOrgani);
            scene.add(groupKoza);
            scene.add(groupBloodParticles);

            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            // Povezivanje događaja i izgradnja anatomije
            setupInterfaceEvents();
            hardReset();
            
            // Slušaoci za napad (levi klik) i promenu prozora
            window.addEventListener('click', performWeaponAttack, false);
            window.addEventListener('resize', onWindowResize, false);

            animateLoop();
        }

        // --- PROCEDURALNA GENERACIJA PRAVIH 3D GEOMETRIJA (Učitava se u VRAM) ---
        function generateHuman3DAssets() {
            // Brisanje starih 3D objekata iz grupa
            while(groupSkelet.children.length > 0) groupSkelet.remove(groupSkelet.children[0]);
            while(groupKrvotok.children.length > 0) groupKrvotok.remove(groupKrvotok.children[0]);
            while(groupOrgani.children.length > 0) groupOrgani.remove(groupOrgani.children[0]);
            while(groupKoza.children.length > 0) groupKoza.remove(groupKoza.children[0]);
            activeOrgansArray = [];

            // 1. PRAVI 3D KOSTUR (Mreža cilindara i sfera)
            const boneMat = new THREE.MeshStandardMaterial({ color: 0xe2e8f0, roughness: 0.6 });
Use code with caution.// Lobanja (3D Sfera)const skullGeo = new THREE.SphereGeometry(0.25, 32, 32);const skullMesh = new THREE.Mesh(skullGeo, boneMat);skullMesh.position.y = 1.3;groupSkelet.add(skullMesh);// Kičma (3D Cilindar)const spineGeo = new THREE.CylinderGeometry(0.03, 0.03, 2.0, 16);const spineMesh = new THREE.Mesh(spineGeo, boneMat);spineMesh.position.y = 0.2;groupSkelet.add(spineMesh);// Grudni koš (Proceduralni 3D prstenovi rebara)for(let i=0; i<8; i++) {let ribGeo = new THREE.TorusGeometry(0.3, 0.015, 8, 24);let ribMesh = new THREE.Mesh(ribGeo, boneMat);ribMesh.position.y = 0.7 - (i * 0.12);ribMesh.rotation.x = Math.PI / 2;groupSkelet.add(ribMesh);}// 2. PRAVI 3D KRVOTOK (Crvene i plave cevi)const artMat = new THREE.MeshStandardMaterial({ color: 0xdc2626, roughness: 0.3 });const venaMat = new THREE.MeshStandardMaterial({ color: 0x2563eb, roughness: 0.3 });const aortaGeo = new THREE.CylinderGeometry(0.015, 0.015, 1.8, 8);const aorta = new THREE.Mesh(aortaGeo, artMat);aorta.position.set(-0.03, 0.2, 0.01);groupKrvotok.add(aorta);const vena = new THREE.Mesh(aortaGeo, venaMat);vena.position.set(0.03, 0.2, -0.01);groupKrvotok.add(vena);// 3. PRAVA 3D KOŽA (Prozirni providni 3D spoljni oklop čoveka)const skinMat = new THREE.MeshStandardMaterial({color: 0xf1c27d, transparent: true, opacity: 0.15, roughness: 0.4});const bodyGeo = new THREE.CylinderGeometry(0.42, 0.35, 2.4, 32);const bodySkin = new THREE.Mesh(bodyGeo, skinMat);bodySkin.position.y = 0.2;groupKoza.add(bodySkin);const headGeo = new THREE.SphereGeometry(0.32, 32, 32);const headSkin = new THREE.Mesh(headGeo, skinMat);headSkin.position.y = 1.3;groupKoza.add(headSkin);// 4. PRAVI 3D ORGANI (PBR materijali visokog sjaja / sluzav izgled)spawn3DOrganModel('Srce', -0.05, 0.4, 0.06, 0x990000, 'sphere');spawn3DOrganModel('Levo Pluće', -0.18, 0.5, -0.02, 0xf472b6, 'cylinder');spawn3DOrganModel('Desno Pluće', 0.18, 0.5, -0.02, 0xf472b6, 'cylinder');spawn3DOrganModel('Jetra', 0.1, 0.0, 0.05, 0x660000, 'cone');}function spawn3DOrganModel(type, x, y, z, colorHex, shape) {let geo;if(shape === 'sphere') geo = new THREE.SphereGeometry(0.12, 32, 32);else if(shape === 'cylinder') geo = new THREE.CylinderGeometry(0.08, 0.08, 0.35, 16);else geo = new THREE.ConeGeometry(0.16, 0.25, 4);const mat = new THREE.MeshPhysicalMaterial({color: colorHex, roughness: 0.05, clearcoat: 1.0, clearcoatRoughness: 0.05});const mesh = new THREE.Mesh(geo, mat);mesh.position.set(x, y, z);groupOrgani.add(mesh);let organObj = { type: type, mesh: mesh, health: 100, baseColor: colorHex };activeOrgansArray.push(organObj);mesh.userData = organObj; // Omogućava prepoznavanje oružjem pri pogotku}// --- SISTEM 3D ČESTICA ZA PRSKANJE KRVI ---function spawn3DBloodSplatter(pos3D, count = 40, speedScale = 1) {const particleGeo = new THREE.SphereGeometry(0.015, 8, 8);const particleMat = new THREE.MeshStandardMaterial({ color: 0xdc2626, roughness: 0.2 });for(let i=0; i<count; i++) {const mesh = new THREE.Mesh(particleGeo, particleMat);mesh.position.copy(pos3D);// Smer prskanja u 3D prostorulet velocity = new THREE.Vector3((Math.random() - 0.5) * 0.1 * speedScale,(Math.random() - 0.2) * 0.12 * speedScale,(Math.random() - 0.5) * 0.1 * speedScale);groupBloodParticles.add(mesh);bloodParticlesArray.push({ mesh: mesh, velocity: velocity, alpha: 1.0 });}}// --- BALISTIČKI REAKTOR ŠTETE I NAPADA (LEVI KLIK) ---function performWeaponAttack(e) {// Ignoriši levi klik ako je preko HUD menija sa stranaif(e.clientX < 330 || e.clientX > window.innerWidth - 330) return;if(!body.isAlive) return;// Pretvaranje 2D klika miša u 3D zrak (Raycasting)mouse.x = (e.clientX / window.innerWidth) * 2 - 1;mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;raycaster.setFromCamera(mouse, camera);// Provera pogodaka nad svim vidljivim slojevima organa i koželet targetsToIntersect = [];if(activeLayers.organi) groupOrgani.children.forEach(c => targetsToIntersect.push(c));if(activeLayers.koza) groupKoza.children.forEach(c => targetsToIntersect.push(c));const intersects = raycaster.intersectObjects(targetsToIntersect);if(intersects.length > 0) {let hitPoint = intersects[0].point;let hitObject = intersects[0].object;logToConsole(💥 HIT: Iskošen pogodak oružjem [${activeWeapon.toUpperCase()}] u 3D prostoru.);// Obračun štete u zavisnosti od izabranog oružjaif(activeWeapon === 'knife') {body.hp = Math.max(0, body.hp - 5);spawn3DBloodSplatter(hitPoint, 15, 0.5);} else if(activeWeapon === 'pistol') {body.hp = Math.max(0, body.hp - 15);spawn3DBloodSplatter(hitPoint, 35, 1.2);} else if(activeWeapon === 'ak47') {body.hp = Math.max(0, body.hp - 35);spawn3DBloodSplatter(hitPoint, 55, 1.6);// Dodatni rafalni ehosetTimeout(() => spawn3DBloodSplatter(hitPoint, 20, 1.0), 80);} else if(activeWeapon === 'rpg') {body.hp = Math.max(0, body.hp - 95);spawn3DBloodSplatter(hitPoint, 150, 3.0); // Masivna 3D eksplozija krvi// Uništi sve unutrašnje organe u bliziniactiveOrgansArray.forEach(o => { o.health = 0; o.mesh.material.color.setHex(0x1e293b); });logToConsole("🚀 RPG DETONACIJA: Katastrofalno razaranje svih 3D bioloških slojeva!");} else if(activeWeapon === 'crossbow') {body.hp = Math.max(0, body.hp - 20);spawn3DBloodSplatter(hitPoint, 20, 0.8);}// Ako je pogođen konkretan 3D model organaif(hitObject.userData && hitObject.userData.type) {let organ = hitObject.userData;organ.health = Math.max(0, organ.health - 40);logToConsole(🎯 OŠTEĆENJE: [${organ.type.toUpperCase()}] integritet pao na ${organ.health}%);if(organ.health === 0) {organ.mesh.material.color.setHex(0x334155); // Promeni boju tkiva u mrtvu sivuspawn3DBloodSplatter(hitPoint, 40, 1.5);}}// Provera smrtiif(body.hp <= 0) {body.isAlive = false; body.bpm = 0;logToConsole("💀 SMRT: Životne funkcije 3D subjekta su ugašene.");}document.getElementById('hud-hp').innerText = body.hp + "%";document.getElementById('hud-bpm').innerText = body.bpm + " BPM";}}// --- UPRAVLJANJE INTERFEJSOM (Dugmad i Slojevi) ---function setupInterfaceEvents() {setupLayerBtn('layer-skelet', 'skelet', groupSkelet);setupLayerBtn('layer-krvotok', 'krvotok', groupKrvotok);setupLayerBtn('layer-organi', 'organi', groupOrgani);setupLayerBtn('layer-koza', 'koza', groupKoza);setupWeaponBtn('weap-knife', 'knife', 'NOŽ');setupWeaponBtn('weap-pistol', 'pistol', 'PIŠTOLJ 9MM');setupWeaponBtn('weap-ak47', 'ak47', 'AK-47');setupWeaponBtn('weap-rpg', 'rpg', 'RPG RAKETA');setupWeaponBtn('weap-crossbow', 'crossbow', 'SAMOSTREL');document.getElementById('add-heart').onclick = () => { spawn3DOrganModel('Sintetičko Srce', 0, 0.2, 0.1, 0xef4444, 'sphere'); logToConsole("❤️ Klonirano novo operativno 3D srce."); };document.getElementById('add-lungs').onclick = () => { spawn3DOrganModel('Sintetičko Pluće', 0.15, -0.2, 0, 0xf472b6, 'cylinder'); logToConsole("🫁 Klonirano novo operativno 3D plućno tkivo."); };document.getElementById('reset-btn').onclick = () => hardReset();}function setupLayerBtn(id, property, threeGroup) {let btn = document.getElementById(id);btn.onclick = () => {activeLayers[property] = !activeLayers[property];btn.classList.toggle('btn-active', activeLayers[property]);threeGroup.visible = activeLayers[property]; // Pali/gasi vidljivost grupe u pravom 3D prostorulogToConsole(Sloj [${property.toUpperCase()}] vidljivost: ${activeLayers[property]});};}function setupWeaponBtn(id, weaponType, hudText) {let btn = document.getElementById(id);btn.onclick = () => {document.querySelectorAll('.weapon-grid .btn').forEach(b => b.classList.remove('btn-active'));btn.classList.add('btn-active');activeWeapon = weaponType;document.getElementById('hud-weapon').innerText = hudText;};}function hardReset() {body = { hp: 100, bpm: 72, isAlive: true };document.getElementById('hud-hp').innerText = "100%";document.getElementById('hud-bpm').innerText = "72 BPM";// Čišćenje čestica krviwhile(groupBloodParticles.children.length > 0) groupBloodParticles.remove(groupBloodParticles.children[0]);bloodParticlesArray = [];generateHuman3DAssets();logToConsole("🔄 POTPUNI REBOOT: Svi 3D WebGL slojevi i PBR materijali su regenerisani.");}function logToConsole(msg) {const box = document.getElementById('console-log');if(box) { box.innerHTML += <div>> ${msg}</div>; box.scrollTop = box.scrollHeight; }}function onWindowResize() {camera.aspect = window.innerWidth / window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth, window.innerHeight);}// --- GLAVNA ANIMACIONA PETLJA (60 FPS RENDERING ENGINE) ---function animateLoop() {requestAnimationFrame(animateLoop);let time = clock.getElapsedTime();// Glatko ažuriranje 3D kamere (OrbitControls inercija)controls.update();// 1. Fizika i simulacija 3D čestica krvi u prostorufor(let i = bloodParticlesArray.length - 1; i >= 0; i--) {let p = bloodParticlesArray[i];p.velocity.y -= 0.003; // 3D Gravitacija vuče čestice nadolep.mesh.position.add(p.velocity);p.alpha -= 0.015;// Ako čestica padne ispod nivoa nogu, ukloni jeif(p.mesh.position.y < -1.8 || p.alpha <= 0) {groupBloodParticles.remove(p.mesh);bloodParticlesArray.splice(i, 1);}}// 2. Organske 3D animacije (Pulsiranje i disanje unutrašnjih modela)if(body.isAlive && activeLayers.organi) {activeOrgansArray.forEach(o => {if(o.type === 'Srce' && o.health > 0) {// Prava trodimenzionalna pulsacija srca pomoću matematičkog sinusalet s = 1.0 + Math.sin(Date.now() * 0.008) * 0.06;o.mesh.scale.set(s, s, s);} else if(o.type.includes('Pluće') && o.health > 0) {// Trodimenzionalno širenje pluća tokom disanjalet s = 1.0 + Math.sin(Date.now() * 0.003) * 0.03;o.mesh.scale.set(s, 1.0, s);}});}// Renderovanje 3D scene kroz grafičku karticurenderer.render(scene, camera);}// Pokretanje motora igre nakon učitavanjawindow.onload = init3DEngine;
