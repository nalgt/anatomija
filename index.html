<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIO-FORENSIC: Independent PBR Weapon & Layer Engine</title>
    <link rel="icon" href="data:,">
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #ffffff; /* Čisto bela pozadina */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #0f172a; user-select: none;
        }
        #view-container { width: 100%; height: 100%; position: absolute; z-index: 1; }
        
        /* Arsenal i Kontrole (HUD) */
        .hud {
            position: absolute; z-index: 10;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(15, 23, 42, 0.15);
            border-radius: 12px; padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }
        #ui-left { top: 20px; left: 20px; width: 310px; }
        #ui-right { top: 20px; right: 20px; width: 310px; }
        #ui-bottom { bottom: 20px; left: 50%; transform: translateX(-50%); width: 45%; display: flex; justify-content: space-around; text-align: center; }
        
        h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 1.5px; margin: 0 0 15px 0; color: #dc2626; border-bottom: 1px solid rgba(0,0,0,0.1); padding-bottom: 8px; }
        .title { font-size: 10px; color: #475569; text-transform: uppercase; margin: 15px 0 5px 0; font-weight: bold; }
        
        /* Selektori Oružja i Slojeva */
        .weapon-grid, .layer-selector { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 10px; }
        
        .btn {
            background: #2563eb; color: white; border: none;
            padding: 12px; border-radius: 6px; font-weight: bold;
            cursor: pointer; font-family: monospace; text-align: center; transition: all 0.2s;
            font-size: 11px;
        }
        .btn:hover { background: #1d4ed8; transform: translateY(-1px); box-shadow: 0 4px 10px rgba(37, 99, 235, 0.2); }
        .btn-active { background: #0f172a !important; box-shadow: 0 0 10px rgba(0,0,0,0.3); }
        .btn-danger { background: #dc2626; }
        .btn-danger:hover { background: #b91c1c; }
        
        .spec-box { background: rgba(0,0,0,0.05); border: 1px solid rgba(0,0,0,0.08); padding: 12px; border-radius: 6px; font-size: 12px; color: #1e293b; }
        #console-log { height: 110px; overflow-y: auto; background: rgba(0,0,0,0.05); border-radius: 6px; padding: 10px; font-family: monospace; font-size: 11px; color: #475569; }
        .stat-val { font-size: 22px; font-weight: bold; color: #16a34a; margin-top: 5px; }
        
        .hint { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); z-index: 5; font-size: 11px; color: #475569; background: rgba(255,255,255,0.8); padding: 6px 15px; border-radius: 20px; pointer-events: none; border: 1px solid rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <div class="hint">LEVI KLIK = PUCAJ / NAPADNI | DRŽITE DESNI KLIK + PREVUCITE = ROTACIJA TELA</div>
    <canvas id="view-container"></canvas>

    <!-- LEVI HUD: Slojevi i Selektor -->
    <div class="hud" id="ui-left">
        <h2>Anatomski Slojevi</h2>
        <div class="title">Izaberi aktivni sloj čoveka:</div>
        <div class="layer-selector">
            <button class="btn btn-active" id="layer-skelet">🦴 Kostur</button>
            <button class="btn btn-active" id="layer-krvotok">🩸 Krvotok</button>
            <button class="btn btn-active" id="layer-organi">🫁 Organi</button>
            <button class="btn btn-active" id="layer-koza">🧍 Koža</button>
        </div>

        <div class="title" style="margin-top:20px;">Sinteza Organa:</div>
        <button class="btn" style="width:100%; margin-bottom:5px;" id="add-heart">❤️ Kloniraj Novo Srce</button>
        <button class="btn" style="width:100%;" id="add-lungs">🫁 Kloniraj Nova Pluća</button>
    </div>

    <!-- DESNI HUD: Naoružanje i Šteta -->
    <div class="hud" id="ui-right">
        <h2>ORUŽJE / ARSENAL</h2>
        <div class="title">Izaberi aktivno sredstvo:</div>
        <div class="weapon-grid">
            <button class="btn btn-active" id="weap-knife">🔪 Hirurški Nož</button>
            <button class="btn" id="weap-pistol">🔫 Pištolj (9mm)</button>
            <button class="btn" id="weap-ak47">🪖 AK-47 Jurišna</button>
            <button class="btn" id="weap-rpg">🚀 RPG Projektil</button>
            <button class="btn" id="weap-crossbow">🏹 Samostrel</button>
        </div>

        <div class="title" style="margin-top:20px;">Forenzička Konzola:</div>
        <div id="console-log"></div>
        <button class="btn btn-danger" style="width:100%; margin-top:10px;" id="reset-btn">🔄 Potpuna Regeneracija</button>
    </div>

    <!-- DONJI HUD: Vitalni znaci -->
    <div class="hud" id="panel-bottom">
        <div style="width:33%;">
            <div style="font-size:10px; color:#475569; font-weight:bold;">INTEGRITET TELA</div>
            <div class="stat-val" id="hud-hp">100%</div>
        </div>
        <div style="width:33%;">
            <div style="font-size:10px; color:#475569; font-weight:bold;">KARDIO PULS</div>
            <div class="stat-val" id="hud-bpm">72 BPM</div>
        </div>
        <div style="width:33%;">
            <div style="font-size:10px; color:#475569; font-weight:bold;">STANJE BALISTIKE</div>
            <div class="stat-val" id="hud-weapon">NOŽ</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('view-container');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        // Sistemi vidljivosti slojeva (Uključeno/Isključeno)
        let activeLayers = { skelet: true, krvotok: true, organi: true, koza: true };
        let activeWeapon = 'knife'; // knife, pistol, ak47, rpg, crossbow

        let body = { hp: 100, bpm: 72, isAlive: true, x: width / 2, y: height / 2 - 30 };
        let rotX = 0.2, rotY = 0.5;
        let isRightDragging = false, lastMouseX = 0, lastMouseY = 0;

        let organs = [];
        let bloodParticles = [];
        let skeletalMesh = []; // 3D Aset Kostura
        let skinMesh = [];     // 3D Aset Kože / Siluete
        let bloodVesselMesh = []; // 3D Aset Arterija

        // --- PROCEDURALNI 3D GENERATOR SVAKOG ASETA (VRAM ALOKACIJA) ---
        function buildFullAnatomyAssets() {
            skeletalMesh = []; skinMesh = []; bloodVesselMesh = []; organs = [];

            // 1. Generisanje 3D Aseta Kostura (Lobanja, Kičma, Rebra)
            // Kičma i rebra
            for(let y = -1.2; y <= 1.2; y += 0.1) {
                skeletalMesh.push({ x: 0, y: y, z: 0, color: '#e2e8f0', r: 3 }); // Pršljenovi
                if(y > -0.4 && y < 1.0) {
                    for(let rAngle = 0; rAngle < Math.PI * 2; rAngle += 0.4) {
                        skeletalMesh.push({ 
                            x: Math.sin(rAngle) * 0.45, y: y, z: Math.cos(rAngle) * 0.25, 
                            color: '#cbd5e1', r: 2 
                        }); // Rebra
                    }
                }
            }
            // Lobanja
            for(let i=0; i<150; i++) {
                let theta = Math.random() * Math.PI * 2;
                let phi = Math.random() * Math.PI;
                skeletalMesh.push({
                    x: 0.3 * Math.sin(phi) * Math.cos(theta),
                    y: 1.5 + 0.3 * Math.cos(phi),
                    z: 0.25 * Math.sin(phi) * Math.sin(theta),
                    color: '#f1f5f9', r: 2
                });
            }

            // 2. Generisanje 3D Aseta Krvotoka (Glavne kapilare i velike arterije)
            for(let y = -1.5; y <= 1.4; y += 0.05) {
                bloodVesselMesh.push({ x: -0.05, y: y, z: 0.02, color: '#dc2626', r: 2 }); // Aorta
                bloodVesselMesh.push({ x: 0.05, y: y, z: -0.02, color: '#2563eb', r: 1.5 }); // Vena Cava
                // Bočne grane
                if(Math.random() > 0.7) {
                    bloodVesselMesh.push({ x: (Math.random()-0.5)*0.6, y: y, z: (Math.random()-0.5)*0.2, color: '#ef4444', r: 1 });
                }
            }

            // 3. Generisanje 3D Aseta Kože (Kompletna spoljna oblozna mreža ćelija čoveka)
            for(let y = -1.8; y <= 1.8; y += 0.08) {
                let rad = 0.55;
                if (y > 1.2) rad = 0.35; // Vrat/Glava
                if (y < -1.0) rad = 0.25; // Noge

                for(let a = 0; a < Math.PI * 2; a += 0.2) {
                    skinMesh.push({
                        x: Math.sin(a) * rad, y: y, z: Math.cos(a) * rad * 0.7,
                        color: 'rgba(241, 194, 125, 0.15)', r: 1.5
                    });
                }
            }

            // 4. Inicijalni Organi
            spawnOrganAsset('Srce', -0.08, 0.4, 0.05, '#b91c1c');
            spawnOrganAsset('Levo Plućno Krilo', -0.28, 0.5, -0.05, '#f472b6');
            spawnOrganAsset('Desno Plućno Krilo', 0.28, 0.5, -0.05, '#f472b6');
            spawnOrganAsset('Jetra', 0.1, -0.1, 0, '#7f1d1d');
        }

        function spawnOrganAsset(type, cx, cy, cz, color) {
            let pts = [];
            let count = 200;
            for(let i=0; i<count; i++) {
                let theta = Math.random() * Math.PI * 2;
                let phi = Math.random() * Math.PI;
                let rx = 0.18, ry = 0.25, rz = 0.15;
                pts.push({
                    x: cx + rx * Math.sin(phi) * Math.cos(theta),
                    y: cy + ry * Math.cos(phi),
                    z: cz + rz * Math.sin(phi) * Math.sin(theta)
                });
            }
Use code with caution.organs.push({ type: type, cx: cx, cy: cy, cz: cz, color: color, points: pts, health: 100 });}// --- 3D PROJEKCIJA MATRICE ---function project3D(x, y, z) {let cosY = Math.cos(rotY), sinY = Math.sin(rotY);let x1 = x * cosY - z * sinY;let z1 = x * sinY + z * cosY;let cosX = Math.cos(rotX), sinX = Math.sin(rotX);let y2 = y * cosX - z1 * sinX;let z2 = y * sinX + z1 * cosX;let zoom = 180;let distance = 4.0;let fov = zoom / (distance + z2);return {x: body.x + x1 * fov,y: body.y - y2 * fov,depth: z2};}// --- SISTEM FIZIKE I EKSPLOZIJE KRVI ---function triggerBloodSpurt(x, y, intensity, type = 'normal') {let count = intensity * 15;let color = type === 'toxic' ? '#16a34a' : '#dc2626'; // Sepsa/Normalna krvfor(let i=0; i<count; i++) {let angle = Math.random() * Math.PI * 2;let speed = Math.random() * 6 + 2;bloodParticles.push({x: x, y: y,vx: Math.cos(angle) * speed,vy: Math.sin(angle) * speed - 2,r: Math.random() * 4 + 1.5,alpha: 1.0,color: color});}}// --- REAKTOR NAPADA I BALISTIKE (KLIK NA EKRAN) ---window.addEventListener('mousedown', (e) => {// Desni klik služi za rotiranje telaif(e.button === 2) {isRightDragging = true;lastMouseX = e.clientX;lastMouseY = e.clientY;return;}// Ignoriši levi klik ako je preko interfejsaif (e.clientX < 330 || e.clientX > width - 330) return;if (!body.isAlive) return;let targetX = e.clientX;let targetY = e.clientY;// Balistički obračun štete na osnovu izabranog oružjalogToConsole(💥 AKCIJA: Korišćen [${activeWeapon.toUpperCase()}] na koordinatama.);if(activeWeapon === 'knife') {body.hp = Math.max(0, body.hp - 5);triggerBloodSpurt(targetX, targetY, 2);checkOrganDamage(targetX, targetY, 15);} else if(activeWeapon === 'pistol') {body.hp = Math.max(0, body.hp - 15);triggerBloodSpurt(targetX, targetY, 4);checkOrganDamage(targetX, targetY, 25);} else if(activeWeapon === 'ak47') {body.hp = Math.max(0, body.hp - 35);// Rafalni efekt (tri brza prskanja)triggerBloodSpurt(targetX, targetY, 6);triggerBloodSpurt(targetX + 10, targetY - 10, 3);checkOrganDamage(targetX, targetY, 40);} else if(activeWeapon === 'rpg') {body.hp = Math.max(0, body.hp - 90);triggerBloodSpurt(targetX, targetY, 25);// Masovna destrukcija svih organa u blizini eksplozijeorgans.forEach(o => { o.health = Math.max(0, o.health - 80); o.color = '#1e293b'; });logToConsole("🚀 RPG DETONACIJA: Katastrofalna šteta na celom telu!");} else if(activeWeapon === 'crossbow') {body.hp = Math.max(0, body.hp - 20);triggerBloodSpurt(targetX, targetY, 3);checkOrganDamage(targetX, targetY, 30);}if(body.hp <= 0) {body.isAlive = false; body.bpm = 0;logToConsole("💀 FORENZIKA: Subjekat je pretrpeo fatalne povrede. Smrt.");}document.getElementById('hud-hp').innerText = body.hp + "%";document.getElementById('hud-bpm').innerText = body.bpm + " BPM";});function checkOrganDamage(screenX, screenY, damage) {organs.forEach(o => {let proj = project3D(o.cx, o.cy, o.cz);let dist = Math.hypot(screenX - proj.x, screenY - proj.y);if(dist < 50) {o.health = Math.max(0, o.health - damage);logToConsole(🎯 HIT: Pogođen organ [${o.type.toUpperCase()}]! Integritet: ${o.health}%);if(o.health === 0) {o.color = '#334155'; // Izumiranje tkiva u sivo-crnu bojutriggerBloodSpurt(proj.x, proj.y, 10);logToConsole(🚨 KRAH: Organ [${o.type.toUpperCase()}] je potpuno uništen.);}}});}// --- UPRAVLJANJE ROTACIJOM I MIŠEM ---window.addEventListener('mousemove', (e) => {if (!isRightDragging) return;let dx = e.clientX - lastMouseX;let dy = e.clientY - lastMouseY;rotY += dx * 0.007;rotX += dy * 0.007;lastMouseX = e.clientX;lastMouseY = e.clientY;});window.addEventListener('mouseup', () => isRightDragging = false);window.addEventListener('contextmenu', (e) => e.preventDefault()); // Sklanja podrazumevani meni na desni klikwindow.addEventListener('resize', () => { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; });// --- EVENT BINDING ZA INTERFEJS (Zaobilazi sve greške) ---function setupInterfaceEvents() {// Selektori slojevasetupLayerBtn('layer-skelet', 'skelet');setupLayerBtn('layer-krvotok', 'krvotok');setupLayerBtn('layer-organi', 'organi');setupLayerBtn('layer-koza', 'koza');// Selektori oružjasetupWeaponBtn('weap-knife', 'knife', 'NOŽ');setupWeaponBtn('weap-pistol', 'pistol', 'PIŠTOLJ 9MM');setupWeaponBtn('weap-ak47', 'ak47', 'AK-47');setupWeaponBtn('weap-rpg', 'rpg', 'RPG RAKETA');setupWeaponBtn('weap-crossbow', 'crossbow', 'SAMOSTREL');// Akcije dodavanja organadocument.getElementById('add-heart').onclick = () => { spawnOrganAsset('Srce', 0, 0.4, 0, '#b91c1c'); logToConsole("❤️ Dodato novo sintetičko srce."); };document.getElementById('add-lungs').onclick = () => { spawnOrganAsset('Pluća', 0.25, 0.5, 0, '#f472b6'); logToConsole("🫁 Dodato novo plućno krilo."); };document.getElementById('reset-btn').onclick = () => hardReset();}function setupLayerBtn(id, property) {let btn = document.getElementById(id);btn.onclick = () => {activeLayers[property] = !activeLayers[property];btn.classList.toggle('btn-active', activeLayers[property]);logToConsole(Sloj [${property.toUpperCase()}] promenjen na: ${activeLayers[property]});};}function setupWeaponBtn(id, weaponType, hudText) {let btn = document.getElementById(id);btn.onclick = () => {// Ugasi aktivnu klasu sa svih dugmadi oružjadocument.querySelectorAll('.weapon-grid .btn').forEach(b => b.classList.remove('btn-active'));btn.classList.add('btn-active');activeWeapon = weaponType;document.getElementById('hud-weapon').innerText = hudText;};}function hardReset() {body = { hp: 100, bpm: 72, isAlive: true, x: width / 2, y: height / 2 - 30 };bloodParticles = [];document.getElementById('hud-hp').innerText = "100%";document.getElementById('hud-bpm').innerText = "72 BPM";buildFullAnatomyAssets();logToConsole("🔄 REGENERACIJA: Svi 3D proceduralni aseti su ponovo generisani.");}function logToConsole(msg) {const box = document.getElementById('console-log');if(box) { box.innerHTML += <div>> ${msg}</div>; box.scrollTop = box.scrollHeight; }}// --- GLAVNI RENDERER SA 3D Z-BUFFER SORTIRANJEM (60 FPS) ---function renderEngine() {ctx.fillStyle = '#ffffff'; // Čisto bela pozadinactx.fillRect(0, 0, width, height);// 1. Fizika i iscrtavanje kapljica krvifor(let i = bloodParticles.length - 1; i >= 0; i--) {let p = bloodParticles[i];p.vy += 0.25; // Padanje krvi pod uticajem gravitacijep.x += p.vx; p.y += p.vy;p.alpha -= 0.015;if(p.y > height) { p.y = height; p.vx = 0; p.vy = 0; } // Zadržavanje na poduif(p.alpha <= 0) { bloodParticles.splice(i, 1); continue; }ctx.fillStyle = p.color;ctx.globalAlpha = p.alpha;ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();}ctx.globalAlpha = 1.0;// 2. Sakupljanje svih 3D aseta u jedan zajednički niz radi dubinskog slaganja (Z-Sort)let renderList = [];// Dodaj Kožuif(activeLayers.koza) {skinMesh.forEach(p => {let proj = project3D(p.x, p.y, p.z);renderList.push({ x: proj.x, y: proj.y, depth: proj.depth, color: p.color, r: p.r });});}// Dodaj Kosturif(activeLayers.skelet) {skeletalMesh.forEach(p => {let proj = project3D(p.x, p.y, p.z);// Jednostavan proračun svetlalet intensity = Math.max(0.4, 1.0 - (proj.depth / 2));renderList.push({ x: proj.x, y: proj.y, depth: proj.depth, color: p.color, r: p.r });});}// Dodaj Krvotokif(activeLayers.krvotok) {bloodVesselMesh.forEach(p => {let proj = project3D(p.x, p.y, p.z);renderList.push({ x: proj.x, y: proj.y, depth: proj.depth, color: p.color, r: p.r });});}// Dodaj Organe (Svi unutrašnji delovi tela)if(activeLayers.organi) {organs.forEach(o => {// Ako je organ srce i pacijent je živ, dodaj mu pulsiranje u realnom vremenulet pulse = (o.type === 'Srce' && body.isAlive) ? 1 + Math.sin(Date.now() * 0.007) * 0.06 : 1;o.points.forEach(p => {// Projekcija u odnosu na poziciju organa unutar telalet proj = project3D(p.x * pulse, p.y, p.z * pulse);renderList.push({ x: proj.x, y: proj.y, depth: proj.depth, color: o.color, r: 2.5 });});});}// 3. Z-Buffer Sortiranje: Crta zadnje tačke prve, a prednje preko njih da se dobije savršen 3D volumenrenderList.sort((a, b) => b.depth - a.depth);// 4. Finalni ispis tačaka na ekranurenderList.forEach(p => {ctx.fillStyle = p.color;ctx.beginPath();ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);ctx.fill();});requestAnimationFrame(renderEngine);}// Takt provere biologijesetInterval(() => {if(!body.isAlive) return;let heartAlive = organs.some(o => o.type === 'Srce' && o.health > 0);if(!heartAlive && body.isAlive) {body.hp = 0; body.isAlive = false; body.bpm = 0;logToConsole("💀 SMRT: Srce je prestalo da radi usled uništenja tkiva.");document.getElementById('hud-hp').innerText = "0%";document.getElementById('hud-bpm').innerText = "0 BPM";}}, 1000);// Inicijalizacijawindow.onload = () => {setupInterfaceEvents();hardReset();renderEngine();};
